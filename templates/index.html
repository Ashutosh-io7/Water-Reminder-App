<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 💧 Hydration Reminder </title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background-color: #f0f8ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .timer-display {
            font-size: 3.5rem;
            font-weight: bold;
            color: #0d6efd; 
        }

    </style>
</head>
<body>
    
    <div class = "container py-5">
        <div class = "text-center mb-5">
            <h1 class = "display-4 fw-bold text-dark"> 💧 Hydration Reminder </h1> 
            <p class = "text-muted"> Stay Healthy , Stay Hydrated. Your Companion for Regular Water Intake. </p>
        </div>

        <div class = "row g-4 justify-content-center">
            <div class = "col-md-5">
                <div class = "card p-4 text-center h-100">
                    <h3 class = "card-title text-secondary"> Next Reminder In </h3>
                    <div class = "timer-display my-3" id = "timer"> 60:00 </div>

                    <div>
                        <button class = "btn btn-outline-primary btn-lg px-4 me-2" id = "startBtn" onclick="toggleTimer()"> Pause </button>
                        <button class = "btn btn-outline-secondary btn-lg px-4" onclick="resetTimer()"> Reset </button>
                    </div>

                </div>
            </div> 

            <div class = "col-md-5">

                <div class = "card p-4 h-100 d-flex flex-column justify-content-between">

                    <div>
                        <h3 class = "card-title text-secondary text-center mb-4"> Daily Tracker </h3>
                        <div class = "text-center mb-3">
                            <span class = "display-5 fw-bold text-success" id = "waterCount"> {{ log.total_glass_count }} </span>
                            <span class = "text-muted"> {{ log.target_glasses }} Glasses </span>
                        </div>

                        <div class = "progress mb-4" style = "height: 25px; border-radius: 12px;">
                            <div id = "progressBar" class = "progress-bar progress-bar-striped progress-bar-animated bg-info"
                            role = "progressbar" style = "width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"> 0% </div>
                        </div>

                    </div>

                    <button class = "btn btn-primary btn-lg w-100 py-3 fw-bold" onclick = "logGlassOfWater()">
                        🥤 I Drank a Glass of Water! 
                    </button>

                </div>
            </div>

        </div>

    </div> 

    <script>

        let defaultTime = 60 * 60 // 60 mins in seconds = 3600 seconds 
        let timeLeft = defaultTime 
        let timerId = null 
        let isPaused = false 

        startTimer() 
        
        function updateDisplay () {
            let minutes = Math.floor(timeLeft / 60) 
            let seconds = timeLeft % 60 
            document.getElementById("timer").innerText = 
            `${minutes.toString().padStart(2 , '0')}:${seconds.toString().padStart(2 , '0')}`
        } 

        function startTimer () {
            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft-- 
                    updateDisplay()
                } else {
                    // Time is Up! Trigger the Python Notification 
                    fetch('/trigger-notification' , {method : 'POST'})
                    timeLeft = defaultTime 
                    updateDisplay() 
                }
            } , 1000) 
        } 

        function toggleTimer () {
            if(isPaused) {
                startTimer()
                document.getElementById('startBtn').innerText = 'Pause'
                document.getElementById('startBtn').className = 'btn btn-outline-primary btn-lg px-4 me-2'
            } else {
                clearInterval(timerId) 
                document.getElementById('startBtn').innerText = 'Resume'
                document.getElementById('startBtn').className = 'btn btn-success btn-lg px-4 me-2'
            } 
            isPaused = !isPaused
        }

        function resetTimer () {
            clearInterval(timerId)
            timeLeft = defaultTime 
            updateDisplay()
            if (!isPaused) startTimer()
        }

        function logGlassOfWater () {
            fetch('/log-water' , {method : 'POST'})
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById("waterCount").innerText = data.current_count 
                    updateProgressBar(data.current_count , data.target) 
                }
            })
        } 

        function updateProgressBar (current , target) {
            let percentage = Math.min(Math.round((current / target) * 100) , 100)
            let bar = document.getElementById('progressBar') 
            bar.style.width = percentage + '%' 
            bar.innerText = percentage + '%' 
            bar.setAttribute('aria-valuenow' , percentage) 
        }

    </script>

</body>
</html>
